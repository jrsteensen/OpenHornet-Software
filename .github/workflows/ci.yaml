name: Continuous Integration

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  push:
    branches:
      - 'main'
      - 'develop'
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  compile-sketches:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.1.1
        with:
          submodules: 'true'

      - uses: actions/setup-python@v5

      - name: Install pyserial
        run: pip install pyserial

      - name: Install Arduino Tools
        run: |
          sudo apt update
          sudo apt-get install -y arduino arduino-core-avr

      - name: Cache esp32 Dependencies
        uses: actions/cache@v4
        with:
          path: libraries/arduino-esp32/tools/dist/
          key: ${{ runner.os }}-${{ hashFiles('.gitmodules') }}

      - name: Install esp32 Tools
        run: |
          cd libraries/arduino-esp32/tools/
          python3 get.py

      - name: Compile Sketches
        run: |
          cd embedded
          make all

      - name: Prep Artifacts
        run: |
          cd embedded
          make release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4.3.1
        with:
          name: firmware
          path: release/
          retention-days: 7

  release-package:
    name: Publish release package
    needs: compile-sketches
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.1.1
        with:
          submodules: 'true'

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: release-package/OpenHornet-Software-${{ github.ref_name }}/firmware

      - name: Install Doxygen
        run: |
          sudo apt update
          sudo apt-get install -y doxygen graphviz rsync zip

      - name: Build Doxygen docs
        run: |
          cd docs
          doxygen Doxyfile
          test -f html/index.html

      - name: Assemble release package
        run: |
          set -euo pipefail

          PACKAGE_ROOT="release-package/OpenHornet-Software-${GITHUB_REF_NAME}"
          mkdir -p "${PACKAGE_ROOT}/docs"

          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.git' \
            --exclude='**/build/' \
            embedded/ "${PACKAGE_ROOT}/embedded/"

          rsync -a --delete --exclude='.git/' --exclude='.git' libraries/ "${PACKAGE_ROOT}/libraries/"
          rsync -a --delete --exclude='.git/' --exclude='.git' include/ "${PACKAGE_ROOT}/include/"
          rsync -a --delete docs/html/ "${PACKAGE_ROOT}/docs/"
          cp LICENSE.md "${PACKAGE_ROOT}/LICENSE.md"

          cat > "${PACKAGE_ROOT}/README.md" <<'EOF'
          # OpenHornet Software Release Package

          This package contains the OpenHornet Software source files, prebuilt firmware, and generated local documentation for this release.

          ## Contents

          - `firmware/` - prebuilt `.hex`, `.eep`, and `.bin` files generated by GitHub Actions for this tag.
          - `embedded/` - OpenHornet embedded sketch source.
          - `libraries/` - Arduino libraries and submodules used by the sketches.
          - `include/` - shared build support, board Makefiles, and Arduino Makefile tooling.
          - `docs/` - generated Doxygen HTML documentation. Open `docs/index.html` in a browser for local reference.
          - `LICENSE.md` - project license.

          ## Documentation

          - Public docs site: https://jrsteensen.github.io/OpenHornet-Software/
          - Local bundled docs: `docs/index.html`
          - Firmware flashing guide: open the public docs site or local bundled docs and search for `Flashing`.
          EOF

          cd release-package
          zip -r "OpenHornet-Software-${GITHUB_REF_NAME}.zip" "OpenHornet-Software-${GITHUB_REF_NAME}"

      - name: Publish Release
        uses: softprops/action-gh-release@v2.6.2
        with:
          name: OpenHornet Software ${{ github.ref_name }}
          generate_release_notes: true
          files: release-package/OpenHornet-Software-${{ github.ref_name }}.zip
          body: |
            Download `OpenHornet-Software-${{ github.ref_name }}.zip` below for the release package. It contains prebuilt firmware, embedded source, libraries, build support, generated local documentation, and the license.

            Documentation: https://jrsteensen.github.io/OpenHornet-Software/
